name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout API repository
        uses: actions/checkout@v4

      - name: Create deploy archive
        run: |
          tar \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./.idea' \
            --exclude='./__pycache__' \
            --exclude='./.venv' \
            --exclude='./.env' \
            --exclude='./files' \
            --exclude='./dist' \
            -czf api-src.tar.gz .

      - name: Upload archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          source: "api-src.tar.gz"
          target: "${{ secrets.VPS_APP_DIR }}/incoming"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            ROOT_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR="${ROOT_DIR}/api"
            INCOMING_DIR="${ROOT_DIR}/incoming"

            mkdir -p "$APP_DIR" "$INCOMING_DIR"
            tar -xzf "$INCOMING_DIR/api-src.tar.gz" -C "$APP_DIR"
            rm -f "$INCOMING_DIR/api-src.tar.gz"

            cd "$APP_DIR"
            python3 -m venv .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt

            mkdir -p files dist

            ${{ secrets.VPS_API_RESTART_CMD }}
